<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GPT 啟動器（灰階主題）</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC",
          "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: #1f2328;
        color: #cfd6dd;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        background: #262b31;
        border: 1px solid #343b44;
        border-radius: 12px;
        padding: 16px;
        margin: 12px 0;
      }
      a.btn {
        display: inline-block;
        padding: 10px 14px;
        border: 1px solid #343b44;
        border-radius: 10px;
        color: #cfd6dd;
        text-decoration: none;
        margin-right: 10px;
      }
      a.btn:hover {
        border-color: #5b6572;
      }
      .hint {
        color: #aab4be;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div style="font-size: 18px; font-weight: 650">GPT 啟動器</div>
        <div class="hint" style="margin-top: 6px">
          注意：ChatGPT 網站通常禁止被別的 HTML 用 iframe 內嵌，所以這個檔案只負責「一鍵開新分頁」。
          灰階/低對比的 CSS 由瀏覽器擴充套件負責注入，重新整理也不會消失。
        </div>
      </div>

      <div class="card">
        <a class="btn" href="https://chatgpt.com/" target="_blank" rel="noreferrer">開啟 chatgpt.com</a>
        <a class="btn" href="https://chat.openai.com/" target="_blank" rel="noreferrer">開啟 chat.openai.com</a>
        <div class="hint" style="margin-top: 10px">
          如果你只用其中一個網域，另一個可以不用管。
        </div>
      </div>
    </div>
  </body>
</html>
